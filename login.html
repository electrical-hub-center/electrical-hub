<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:Arial;
}

.box{
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:#0072ff;
  color:white;
  border:none;
}
</style>

</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

// 👉 নিজের login set করো
if(user==="admin" && pass==="1234"){

// 🔐 SAVE LOGIN
localStorage.setItem("adminLogin","true");

// redirect
window.location.href="admin.html";

}else{
alert("Wrong Login ❌");
}

}

</script>

</body>
</html>
