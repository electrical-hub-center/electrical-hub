<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* 🌌 BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* 🧭 SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:#111;
  padding:20px;
}

.sidebar h2{
  color:#00f2ff;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

/* 📊 MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* 📦 CARD */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

/* STATUS COLORS */
.pending{color:red;}
.shipped{color:orange;}
.delivered{color:lightgreen;}

/* FILTER */
.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin:0;}
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Admin</h2>

<button onclick="loadOrders()">📦 Orders</button>
<button onclick="filterOrders('COD')">💵 COD</button>
<button onclick="filterOrders('ONLINE')">💳 Online</button>

</div>

<!-- MAIN -->
<div class="main">

<h1>📊 Dashboard</h1>

<div class="topbar">
<input id="searchPhone" placeholder="Search by phone">
<button onclick="searchOrder()">Search</button>
</div>

<div id="orders"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db=getFirestore(app);

let allOrders=[];

// 🔥 LOAD ALL
window.loadOrders = async function(){

let snap=await getDocs(collection(db,"orders"));
allOrders=[];

snap.forEach(d=>{
allOrders.push({id:d.id,...d.data()});
});

render(allOrders);
}

// 🎯 RENDER
function render(list){

let out="";

list.forEach(d=>{

let statusClass=
d.deliveryStatus==="Delivered"?"delivered":
d.deliveryStatus==="Shipped"?"shipped":"pending";

out+=`
<div class="card">

<h3>${d.product}</h3>

<p>🆔 ${d.orderId}</p>
<p>👤 ${d.name}</p>
<p>📞 ${d.phone}</p>
<p>📍 ${d.address}</p>

<p>💰 ${d.payment}</p>
<p>💳 ${d.paymentStatus}</p>

<p class="${statusClass}">
🚚 ${d.deliveryStatus}
</p>

<select onchange="updateStatus('${d.id}',this.value)">
<option>Update Status</option>
<option>Pending</option>
<option>Shipped</option>
<option>Delivered</option>
</select>

</div>
`;
});

document.getElementById("orders").innerHTML=out||"No Orders ❌";
}

// 🔄 UPDATE
window.updateStatus = async function(id,status){

await updateDoc(doc(db,"orders",id),{
deliveryStatus:status
});

alert("Updated ✅");
loadOrders();
}

// 🔍 SEARCH
window.searchOrder=function(){

let phone=document.getElementById("searchPhone").value;

let filtered=allOrders.filter(o=>o.phone.includes(phone));

render(filtered);
}

// 🎯 FILTER
window.filterOrders=function(type){

let filtered=allOrders.filter(o=>o.payment===type);

render(filtered);
}

// START
loadOrders();

</script>

</body>
</html>
