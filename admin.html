<h2>🧑‍💼 Admin Panel</h2>

<div id="ordersList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain:"https://electrical-hub-center.firebaseapp.com",
  projectId:"electrical-hub-center"
});

const db = getFirestore(app);

// 🔥 LOAD ORDERS
async function loadOrders(){
  let snap = await getDocs(collection(db,"orders"));
  let out = "";

  snap.forEach(d=>{
    let data = d.data();

    out += `
    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
      <h3>${data.orderId}</h3>
      <p>${data.product} - ₹${data.price}</p>
      <p>Payment: ${data.paymentStatus}</p>
      <p>Delivery: ${data.deliveryStatus}</p>

      <!-- 🔥 STATUS CHANGE -->
      <select onchange="updateStatus('${d.id}', this.value)">
        <option>Pending</option>
        <option>Confirmed</option>
        <option>Shipped</option>
        <option>Delivered</option>
      </select>
    </div>
    `;
  });

  document.getElementById("ordersList").innerHTML = out;
}

loadOrders();

<script>
async function updateStatus(id, status){
  const ref = doc(db,"orders",id);

  await updateDoc(ref,{
    deliveryStatus: status
  });

  alert("Status Updated ✅");
  location.reload();
}

window.updateStatus = updateStatus;
</script>
