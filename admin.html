<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  position:fixed;
  background:#111;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  margin-left:250px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

/* STATUS */
.pending{color:red;}
.shipped{color:orange;}
.delivered{color:lightgreen;}


.card p{
  margin:4px 0;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>⚡ Admin</h2>

<button onclick="loadOrders()">📦 All Orders</button>
<button onclick="filterPayment('COD')">💵 COD</button>
<button onclick="filterPayment('ONLINE')">💳 Online</button>

<h3>📅 Filter Orders</h3>
<input type="date" id="filterDate">
<button onclick="filterByDate()">Search</button>

<hr>

<h3>📋 Bookings</h3>
<button onclick="loadBookings()">Show All</button>

<input type="date" id="bookingDate">
<input type="time" id="bookingTime">
<button onclick="filterBookings()">Filter</button>

<hr>

<button onclick="logout()">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<h1>📊 Dashboard</h1>

<input id="searchPhone" placeholder="Search by phone">
<button onclick="searchOrder()">Search</button>

<div id="orders"></div>

<h2>📋 Booking List</h2>
<div id="bookingList"></div>

</div>

<!-- 🔐 LOGIN CHECK -->
<script>
if(localStorage.getItem("adminLogin")!=="true"){
  window.location.href="login.html";
}

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href="login.html";
}
</script>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain:"electrical-hub-center.firebaseapp.com",
  projectId:"electrical-hub-center"
});

const db = getFirestore(app);

let allOrders=[];

// 🔥 LOAD ORDERS
window.loadOrders = async function(){

let snap = await getDocs(collection(db,"orders"));
allOrders = [];

snap.forEach(d=>{
  allOrders.push({id:d.id,...d.data()});
});

renderOrders(allOrders);
}

// 🎯 RENDER ORDERS
function renderOrders(list){

let out="";

list.forEach(d=>{

let statusClass =
d.deliveryStatus==="Delivered"?"delivered":
d.deliveryStatus==="Shipped"?"shipped":"pending";

let payColor = d.paymentStatus==="Paid" ? "lightgreen" : "red";

out+=`
<div class="card">

<img src="${d.image}" style="width:100%;height:150px;border-radius:10px;object-fit:cover;">


<h3>${d.product}</h3>
<p style="font-size:13px;color:#ccc;">
📝 ${d.desc || "No Description"}
</p>

<p>🆔 ${d.orderId || "N/A"}</p>
<p>👤 ${d.name}</p>
<p>📞 ${d.phone}</p>
<p>📍 ${d.address}</p>

<p>💰 ₹${d.price}</p>

<p style="color:${payColor}">
💳 ${d.paymentStatus}
</p>

<p class="${statusClass}">
🚚 ${d.deliveryStatus}
</p>

<!-- DELIVERY -->
<select onchange="updateStatus('${d.id}',this.value)">
<option>Update Delivery</option>
<option>Pending</option>
<option>Shipped</option>
<option>Delivered</option>
</select>

<!-- PAYMENT -->
<select onchange="updatePayment('${d.id}',this.value)">
<option>Update Payment</option>
<option>Pending</option>
<option>Paid</option>
</select>

</div>
`;
});

document.getElementById("orders").innerHTML = out || "No Orders ❌";
}

// 🔄 DELIVERY UPDATE
window.updateStatus = async function(id,status){
if(status=="Update Delivery") return;

await updateDoc(doc(db,"orders",id),{
  deliveryStatus:status
});

alert("Delivery Updated ✅");
loadOrders();
}

// 💳 PAYMENT UPDATE
window.updatePayment = async function(id,status){
if(status=="Update Payment") return;

await updateDoc(doc(db,"orders",id),{
  paymentStatus:status
});

alert("Payment Updated ✅");
loadOrders();
}

// 🔍 SEARCH
window.searchOrder = function(){
let phone = document.getElementById("searchPhone").value;
let filtered = allOrders.filter(o=>o.phone.includes(phone));
renderOrders(filtered);
}

// 💵 FILTER PAYMENT
window.filterPayment = function(type){
let filtered = allOrders.filter(o=>o.payment===type);
renderOrders(filtered);
}

// 📅 FILTER DATE
window.filterByDate = function(){

let date = document.getElementById("filterDate").value;

let filtered = allOrders.filter(o=>{
if(!o.time) return false;

let d = new Date(o.time.seconds*1000)
.toISOString().split("T")[0];

return d===date;
});

renderOrders(filtered);
}

// ==================
// 📋 BOOKINGS
// ==================

window.loadBookings = async function(){

let snap = await getDocs(collection(db,"bookings"));
let out="";

snap.forEach(doc=>{
let d = doc.data();

let dt = d.time ? new Date(d.time.seconds*1000) : null;

out+=`
<div class="card">
<h3>${d.service}</h3>
<p>👤 ${d.name}</p>
<p>📞 ${d.phone}</p>
<p>📍 ${d.address}</p>
<p>📅 ${dt ? dt.toLocaleString() : ""}</p>
</div>
`;
});

document.getElementById("bookingList").innerHTML = out || "No Booking ❌";
}

// 🔍 FILTER BOOKINGS
window.filterBookings = async function(){

let date = document.getElementById("bookingDate").value;
let time = document.getElementById("bookingTime").value;

let snap = await getDocs(collection(db,"bookings"));
let out="";

snap.forEach(doc=>{
let d = doc.data();
if(!d.time) return;

let dt = new Date(d.time.seconds*1000);

let dStr = dt.toISOString().split("T")[0];
let tStr = dt.toTimeString().slice(0,5);

if((!date || dStr===date) && (!time || tStr===time)){

out+=`
<div class="card">
<h3>${d.service}</h3>
<p>👤 ${d.name}</p>
<p>📞 ${d.phone}</p>
<p>📍 ${d.address}</p>
<p>📅 ${dt.toLocaleString()}</p>
</div>
`;
}

});

document.getElementById("bookingList").innerHTML = out || "No Booking ❌";
}

// START
loadOrders();

</script>

</body>
</html>
