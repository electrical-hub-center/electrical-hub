<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

.card{
  background:#222;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

select{
  padding:5px;
}
</style>

</head>

<body>

<h1>📊 Admin Panel</h1>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain:"https://electrical-hub-center.firebaseapp.com",
  projectId:"electrical-hub-center"
});

const db = getFirestore(app);

// 🔥 LOAD ORDERS
async function loadOrders(){

  let snap = await getDocs(collection(db,"orders"));
  let out = "";

  snap.forEach(d=>{

    let data = d.data();
    let id = d.id;

    let statusColor =
      data.deliveryStatus==="Delivered" ? "green" :
      data.deliveryStatus==="Shipped" ? "orange" : "red";

    out += `
    <div class="card">
      <h3>${data.product}</h3>

      <p>👤 ${data.name}</p>
      <p>📞 ${data.phone}</p>

      <p>💰 Payment: ${data.payment}</p>
      <p>💳 Status: ${data.paymentStatus}</p>

      <p style="color:${statusColor}">
        🚚 ${data.deliveryStatus}
      </p>

      <select onchange="updateStatus('${id}', this.value)">
        <option value="">Change Status</option>
        <option>Pending</option>
        <option>Shipped</option>
        <option>Delivered</option>
      </select>
    </div>
    `;
  });

  document.getElementById("orders").innerHTML = out;
}

// 🔄 UPDATE STATUS
window.updateStatus = async function(id,status){

  let ref = doc(db,"orders",id);

  await updateDoc(ref,{
    deliveryStatus: status
  });

  alert("Updated ✅");
  loadOrders();
}

// START
loadOrders();

</script>

</body>
</html>
