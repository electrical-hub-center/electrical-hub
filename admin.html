<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* 🌌 BACKGROUND */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* 🧭 SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:#111;
  padding:20px;
}

.sidebar h2{
  color:#00f2ff;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

/* 📊 MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* 📦 CARD */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

/* STATUS COLORS */
.pending{color:red;}
.shipped{color:orange;}
.delivered{color:lightgreen;}

/* FILTER */
.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin:0;}
}

</style>

</head>

</head>

<body>

<h1>📊 Admin Panel</h1>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain:"https://electrical-hub-center.firebaseapp.com",
  projectId:"electrical-hub-center"
});

const db = getFirestore(app);

// 🔥 LOAD ORDERS
async function loadOrders(){

  let snap = await getDocs(collection(db,"orders"));
  let out = "";

  snap.forEach(d=>{

    let data = d.data();
    let id = d.id;

    let statusColor =
      data.deliveryStatus==="Delivered" ? "green" :
      data.deliveryStatus==="Shipped" ? "orange" : "red";

    out += `
    <div class="card">
      <h3>${data.product}</h3>

      <p>👤 ${data.name}</p>
      <p>📞 ${data.phone}</p>

      <p>💰 Payment: ${data.payment}</p>
      <p>💳 Status: ${data.paymentStatus}</p>

      <p style="color:${statusColor}">
        🚚 ${data.deliveryStatus}
      </p>

      <select onchange="updateStatus('${id}', this.value)">
        <option value="">Change Status</option>
        <option>Pending</option>
        <option>Shipped</option>
        <option>Delivered</option>
      </select>
    </div>
    `;
  });

  document.getElementById("orders").innerHTML = out;
}

// 🔄 UPDATE STATUS
window.updateStatus = async function(id,status){

  let ref = doc(db,"orders",id);

  await updateDoc(ref,{
    deliveryStatus: status
  });

  alert("Updated ✅");
  loadOrders();
}

// START
loadOrders();

</script>

</body>
</html>
