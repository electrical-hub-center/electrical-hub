<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  position:fixed;
  background:#111;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  margin-left:250px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

.pending{color:red;}
.shipped{color:orange;}
.delivered{color:lightgreen;}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:5px;
  border:none;
}

button.small{
  padding:6px 10px;
  margin:5px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>⚡ Admin</h2>

<button onclick="loadOrders()">📦 All Orders</button>
<button onclick="filterPayment('COD')">💵 COD</button>
<button onclick="filterPayment('ONLINE')">💳 Online</button>

<h3>📅 Filter Orders</h3>
<input type="date" id="filterDate">
<button onclick="filterByDate()">Search</button>

<hr>

<h3>📋 Bookings</h3>
<button onclick="loadBookings()">Show All</button>

<input type="date" id="bookingDate">
<input type="time" id="bookingTime">
<button onclick="filterBookings()">Filter</button>

<hr>

<button onclick="logout()">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<h1>📊 Dashboard</h1>

<input id="searchPhone" placeholder="Search by phone">
<button onclick="searchOrder()">Search</button>

<div id="orders"></div>

<h2>📋 Booking List</h2>
<div id="bookingList"></div>

<h2>🛒 Product Management</h2>

<div class="card">
<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">
<input id="pImage" placeholder="Image URL">
<textarea id="pDesc" placeholder="Description"></textarea>
<button id="addBtn" onclick="addProduct()">➕ Add Product</button>
</div>

<div id="productList"></div>

</div>

<!-- LOGIN -->
<script>
if(localStorage.getItem("adminLogin")!=="true"){
  window.location.href="login.html";
}
function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href="login.html";
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain:"electrical-hub-center.firebaseapp.com",
  projectId:"electrical-hub-center"
});

const db = getFirestore(app);

let allOrders=[];

/* ================= ORDERS ================= */

window.loadOrders = async function(){
  let snap = await getDocs(collection(db,"orders"));
  allOrders=[];

  snap.forEach(d=>{
    allOrders.push({id:d.id,...d.data()});
  });

  renderOrders(allOrders);
}

function renderOrders(list){
  let out="";

  list.forEach(d=>{
    let statusClass =
    d.deliveryStatus==="Delivered"?"delivered":
    d.deliveryStatus==="Shipped"?"shipped":"pending";

    let payColor = d.paymentStatus==="Paid" ? "lightgreen" : "red";

    out+=`
    <div class="card">
      <img src="${d.image}" style="width:100%;height:150px;border-radius:10px;">
      <h3>${d.product}</h3>
      <p>${d.description || "No Description"}</p>

      <p>🆔 ${d.orderId || ""}</p>
      <p>👤 ${d.name}</p>
      <p>📞 ${d.phone}</p>
      <p>📍 ${d.address}</p>

      <p>💰 ₹${d.price}</p>

      <p style="color:${payColor}">
      💳 ${d.paymentStatus}
      </p>

      <p class="${statusClass}">
      🚚 ${d.deliveryStatus}
      </p>

      <select onchange="updateStatus('${d.id}',this.value)">
        <option>Update Delivery</option>
        <option>Pending</option>
        <option>Shipped</option>
        <option>Delivered</option>
      </select>

      <select onchange="updatePayment('${d.id}',this.value)">
        <option>Update Payment</option>
        <option>Pending</option>
        <option>Paid</option>
      </select>
    </div>`;
  });

  document.getElementById("orders").innerHTML = out;
}

/* ================= BOOKINGS ================= */

window.loadBookings = async function(){
  let snap = await getDocs(collection(db,"bookings"));
  let out="";

  snap.forEach(doc=>{
    let d = doc.data();
    let dt = d.time ? new Date(d.time.seconds*1000) : "";

    out+=`
    <div class="card">
      <h3>${d.service}</h3>
      <p>👤 ${d.name}</p>
      <p>📞 ${d.phone}</p>
      <p>📍 ${d.address}</p>
      <p>📅 ${dt}</p>
    </div>`;
  });

  bookingList.innerHTML = out;
}

window.filterBookings = async function(){

  let date = bookingDate.value;
  let time = bookingTime.value;

  let snap = await getDocs(collection(db,"bookings"));
  let out="";

  snap.forEach(doc=>{
    let d = doc.data();
    if(!d.time) return;

    let dt = new Date(d.time.seconds*1000);

    let dStr = dt.toISOString().split("T")[0];
    let tStr = dt.toTimeString().slice(0,5);

    if((!date || dStr===date) && (!time || tStr===time)){
      out+=`
      <div class="card">
        <h3>${d.service}</h3>
        <p>${d.name}</p>
        <p>${d.phone}</p>
        <p>${d.address}</p>
        <p>${dt.toLocaleString()}</p>
      </div>`;
    }
  });

  bookingList.innerHTML = out || "No Booking ❌";
}

/* ================= PRODUCTS ================= */

window.addProduct = async function(){

  let name = pName.value;
  let price = pPrice.value;
  let image = pImage.value;
  let desc = pDesc.value;

  if(!name||!price||!image){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"products"),{
    name,price,image,desc,time:new Date()
  });

  alert("Product Added ✅");
  loadProducts();
}

window.loadProducts = async function(){

  let snap = await getDocs(collection(db,"products"));
  let out="";

  snap.forEach(d=>{
    let data=d.data();

    out+=`
    <div class="card">
      <img src="${data.image}" style="width:100%;height:150px;">
      <h3>${data.name}</h3>
      <p>₹${data.price}</p>
      <p>${data.desc||""}</p>

      <button class="small" onclick="deleteProduct('${d.id}')">🗑 Delete</button>
      <button class="small" onclick="editProduct('${d.id}','${data.name}','${data.price}','${data.image}','${data.desc}')">✏ Edit</button>
    </div>`;
  });

  productList.innerHTML=out;
}

window.deleteProduct = async function(id){
  if(!confirm("Delete?")) return;
  await deleteDoc(doc(db,"products",id));
  loadProducts();
}

window.editProduct = function(id,name,price,image,desc){

  pName.value=name;
  pPrice.value=price;
  pImage.value=image;
  pDesc.value=desc;

  addBtn.innerText="Update Product";

  addBtn.onclick=async function(){

    await updateDoc(doc(db,"products",id),{
      name:pName.value,
      price:pPrice.value,
      image:pImage.value,
      desc:pDesc.value
    });

    alert("Updated ✅");

    addBtn.innerText="➕ Add Product";
    addBtn.onclick=addProduct;

    loadProducts();
  }
}

/* ================= COMMON ================= */

window.updateStatus = async function(id,status){
  if(status=="Update Delivery") return;
  await updateDoc(doc(db,"orders",id),{deliveryStatus:status});
  loadOrders();
}

window.updatePayment = async function(id,status){
  if(status=="Update Payment") return;
  await updateDoc(doc(db,"orders",id),{paymentStatus:status});
  loadOrders();
}

window.searchOrder = function(){
  let phone = searchPhone.value;
  let filtered = allOrders.filter(o=>o.phone.includes(phone));
  renderOrders(filtered);
}

window.filterPayment = function(type){
  let filtered = allOrders.filter(o=>o.payment===type);
  renderOrders(filtered);
}

window.filterByDate = function(){
  let date = filterDate.value;

  let filtered = allOrders.filter(o=>{
    if(!o.time) return false;

    let d = new Date(o.time.seconds*1000)
    .toISOString().split("T")[0];

    return d===date;
  });

  renderOrders(filtered);
}

/* AUTO LOAD */
loadOrders();
loadBookings();
loadProducts();

</script>

</body>
</html>
